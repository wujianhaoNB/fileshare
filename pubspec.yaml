name: fileshare
description: Cross-platform file transfer app - LAN, Bluetooth, and Internet relay.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.4.0

  # Routing
  go_router: ^14.2.0

  # Database
  drift: ^2.19.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3

  # Network
  multicast_dns: ^0.3.2

  # Bluetooth
  flutter_blue_plus: ^1.32.0

  # QR code
  mobile_scanner: ^5.2.0
  qr_flutter: ^4.1.0

  # Cryptography
  cryptography: ^2.7.0
  ed25519_edwards: ^0.3.0

  # UI
  file_picker: ^8.0.3
  share_plus: ^9.0.0
  url_launcher: ^6.2.6
  flutter_local_notifications: ^17.2.0
  system_tray: ^2.0.3
  wakelock_plus: ^1.2.0
  permission_handler: ^11.3.0
  flutter_background_service: ^5.0.10

  # Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # Utilities
  logger: ^2.4.0
  uuid: ^3.0.7
  collection: ^1.18.0
  intl: ^0.19.0
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.4.9
  drift_dev: ^2.19.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  mocktail: ^1.0.3
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
