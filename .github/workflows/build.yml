name: Build APK & IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: fileshare-android
          path: build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Flutter precache
        run: flutter precache --ios

      - name: Flutter pub get
        run: flutter pub get

      - name: Set iOS deployment target
        run: |
          sed -i '' 's/# platform :ios, .*/platform :ios, "13.0"/' ios/Podfile
          /usr/libexec/PlistBuddy -c "Set :MinimumOSVersion 13.0" ios/Runner/Info.plist 2>/dev/null || true

      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods --no-document
          cd ios
          pod install --repo-update

      - name: Build iOS (unsigned)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/Release-iphoneos/Runner.app Payload/
          zip -r fileshare.ipa Payload/

      - uses: actions/upload-artifact@v4
        with:
          name: fileshare-ios
          path: fileshare.ipa
